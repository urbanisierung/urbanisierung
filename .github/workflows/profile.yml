name: Profile

on:
  schedule:
    # Daily at 04:17 UTC (off the hour to avoid Actions congestion).
    - cron: "17 4 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/profile.yml"
      - ".github/scripts/profile.mjs"

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate live README sections
        env:
          # Swap for a PAT (secrets.GH_PAT) to include private contributions/repos.
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: node .github/scripts/profile.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No profile changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update live profile sections"
          git push
